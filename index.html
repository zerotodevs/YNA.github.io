<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Yani Only!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-deep:   #c2185b;
      --pink-mid:    #e91e8c;
      --pink-soft:   #f48fb1;
      --pink-pale:   #fce4ec;
      --pink-blush:  #fff0f5;
      --pink-rose:   #f8bbd0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 40%, #f8bbd0 100%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .petal {
      position: fixed;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh)  rotate(360deg); opacity: 0; }
    }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1.5px solid rgba(244,143,177,0.35);
      border-radius: 32px;
      padding: 56px 52px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(194,24,91,.10), 0 2px 8px rgba(194,24,91,.06);
      position: relative;
      z-index: 10;
      animation: popIn .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(.85) translateY(30px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    .lock-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
      animation: wiggle 2.5s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-6deg); }
      50%      { transform: rotate(6deg); }
    }

    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      color: var(--pink-deep);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .card h1 em { color: var(--pink-mid); font-style: italic; }

    .subtitle {
      font-size: 0.92rem;
      color: #b06080;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .dots-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .dot-box {
      width: 54px; height: 64px;
      background: rgba(252,228,236,0.7);
      border: 2px solid var(--pink-rose);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      color: var(--pink-deep);
      font-family: 'Playfair Display', serif;
      transition: border-color .2s, background .2s, transform .15s;
    }
    .dot-box.filled  { background: var(--pink-pale); border-color: var(--pink-mid); transform: scale(1.06); }
    .dot-box.active  { border-color: var(--pink-deep); box-shadow: 0 0 0 3px rgba(194,24,91,.15); }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto 24px;
    }
    .key {
      background: rgba(255,255,255,0.8);
      border: 1.5px solid var(--pink-rose);
      border-radius: 14px;
      padding: 14px 0;
      font-size: 1.2rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      color: var(--pink-deep);
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      user-select: none;
    }
    .key:hover  { background: var(--pink-pale); box-shadow: 0 4px 12px rgba(194,24,91,.12); }
    .key:active { transform: scale(.94); }
    .key.del    { font-size: 1rem; }
    .key.zero   { grid-column: 2; }

    .shake { animation: shake .4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%,90% { transform: translateX(-4px); }
      30%,70% { transform: translateX(6px); }
      50%      { transform: translateX(-4px); }
    }

    .msg { font-size: .85rem; min-height: 20px; color: var(--pink-deep); font-weight: 600; }

    .success-overlay {
      position: fixed; inset: 0;
      background: rgba(252,228,236,.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .5s;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    .success-overlay .big { font-size: 5rem; margin-bottom: 16px; animation: bounce .6s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-14px); } }
    .success-overlay p {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--pink-deep);
      margin-bottom: 28px;
      text-align: center;
    }
    .enter-btn {
      background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 40px; font-size: 1rem;
      font-family: 'Quicksand', sans-serif; font-weight: 700;
      cursor: pointer; letter-spacing: .04em;
      box-shadow: 0 6px 20px rgba(194,24,91,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .enter-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(194,24,91,.35); }

    .burst { position: fixed; pointer-events: none; z-index: 200; }
    .burst span {
      position: absolute; font-size: 1.5rem;
      animation: burst-anim .9s ease forwards;
    }
    @keyframes burst-anim {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="petals"></div>

  <div class="card" id="card">
    <span class="lock-icon">🔒</span>
    <h1>This is for <em>Yani</em> only.</h1>
    <p class="subtitle">To verify, please enter our code:</p>

    <div class="dots-row" id="dots">
      <div class="dot-box active" id="d0"></div>
      <div class="dot-box" id="d1"></div>
      <div class="dot-box" id="d2"></div>
      <div class="dot-box" id="d3"></div>
    </div>

    <div class="numpad" id="numpad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key del" data-n="del">⌫</button>
      <button class="key zero" data-n="0">0</button>
    </div>

    <p class="msg" id="msg"></p>
  </div>

  <div class="success-overlay" id="success">
    <div class="big">🌸</div>
    <p>It's really you, Yani!<br><small style="font-size:1rem;color:#b06080">Welcome to your special place, Yna!</small></p>
    <button class="enter-btn" onclick="window.location.href='home.html'">Enter</button>
  </div>

  <script>
    const petalWrap = document.getElementById('petals');
    ['🌸','🌺','💮','🌷','💗'].forEach((e,i) => {
      for (let j = 0; j < 4; j++) {
        const p = document.createElement('div');
        p.className = 'petal'; p.textContent = e;
        p.style.left = Math.random()*100+'vw';
        p.style.fontSize = (.9+Math.random()*.7)+'rem';
        p.style.animationDuration = (5+Math.random()*8)+'s';
        p.style.animationDelay = (Math.random()*8)+'s';
        petalWrap.appendChild(p);
      }
    });

    const SECRET = '0000';
    let entered = '';

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('d'+i);
        d.classList.toggle('filled', i < entered.length);
        d.classList.toggle('active', i === entered.length);
        d.textContent = i < entered.length ? '•' : '';
      }
    }
    function push(n) {
      if (entered.length >= 4) return;
      entered += n; updateDots();
      if (entered.length === 4) setTimeout(check, 200);
    }
    function del() {
      entered = entered.slice(0,-1);
      document.getElementById('msg').textContent = '';
      updateDots();
    }
    function check() {
      if (entered === SECRET) {
        for (let i = 0; i < 10; i++) spawnBurst();
        setTimeout(() => document.getElementById('success').classList.add('show'), 400);
      } else {
        const card = document.getElementById('card');
        card.classList.add('shake');
        document.getElementById('msg').textContent = '❌ Hmm, try again! Only Yani knows 💭';
        setTimeout(() => { card.classList.remove('shake'); entered = ''; updateDots(); }, 500);
      }
    }
    function spawnBurst() {
      const b = document.createElement('div'); b.className = 'burst';
      const cx = window.innerWidth/2, cy = window.innerHeight/2;
      b.style.left = cx+'px'; b.style.top = cy+'px';
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('span');
        const a = (i/8)*360, d = 80+Math.random()*80;
        s.style.setProperty('--tx', Math.cos(a*Math.PI/180)*d+'px');
        s.style.setProperty('--ty', Math.sin(a*Math.PI/180)*d+'px');
        s.style.animationDelay = Math.random()*.3+'s';
        s.textContent = ['💗','💕','💖','🌸'][i%4];
        b.appendChild(s);
      }
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 1200);
    }

    document.getElementById('numpad').addEventListener('click', e => {
      const n = e.target.closest('[data-n]')?.dataset.n;
      if (!n) return;
      n === 'del' ? del() : push(n);
    });
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') push(e.key);
      if (e.key === 'Backspace') del();
    });
  </script>
</body>
</html>
