<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="verify-body">
    <div class="verify-container">
        <h1>This is for yani only.</h1>
        <p>To verify please enter our code:</p>
        <input type="password" id="passcode" maxlength="4" placeholder="****">
        <button onclick="checkCode()">Verify</button>
        <p id="error" style="color: #d63384; margin-top: 10px; display: none;">Incorrect code. Try again!</p>
    </div>

    <script>
        function checkCode() {
            const code = document.getElementById('passcode').value;
            if (code === "2615") {
                window.location.href = "main.html";
            } else {
                document.getElementById('error').style.display = "block";
            }
        }
    </script>
</body>
</html>
