<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>See How Debi Values You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --pink-deep:  #a35b7e; 
      --pink-mid:   #e91e8c;
      --pink-soft:  #fbcfe8; 
      --pink-pale:  #fce4ec;
      --bg-cream:   #F8F1E7; 
      --nav-h: 80px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Quicksand', sans-serif;
      background-color: var(--bg-cream);
      color: #4a1030;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .top-banner {
      background-color: var(--pink-deep);
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 0.85rem;
      text-transform: uppercase;
      position: relative;
      z-index: 10;
    }

    nav {
      display: flex;
      justify-content: center;
      margin-top: 25px;
      position: relative;
      z-index: 10;
    }
    .nav-pill {
      background-color: var(--pink-soft);
      padding: 12px 60px;
      border-radius: 50px;
      display: flex;
      gap: 50px;
      box-shadow: 0 4px 15px rgba(233, 30, 140, 0.1);
    }
    .nav-pill a {
      text-decoration: none;
      color: #4a1030;
      font-weight: 600;
      font-size: 1rem;
      transition: 0.3s;
    }
    .nav-pill a:hover { color: white; }

    .petal {
      position: fixed;
      top: -10%;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 50px;
      position: relative;
    }

    .hero-left {
      flex: 1;
      position: relative;
      z-index: 5;
    }

    .hero-question {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: var(--pink-deep);
      line-height: 0.9;
      margin-bottom: 25px;
    }
    .hero-name span {
      display: block;
      text-transform: uppercase;
      font-size: 5.5rem;
      font-weight: 900;
    }

    .explore-btn {
      display: inline-block;
      background-color: var(--pink-soft);
      color: #4a1030;
      padding: 14px 45px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: 0.3s;
    }
    .explore-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(163, 91, 126, 0.2);
    }

    .deco-butterfly {
      position: absolute;
      width: 120px;
      z-index: 2;
      opacity: 0.8;
      animation: float 4s ease-in-out infinite;
    }
    .butterfly-1 { bottom: -20px; left: -40px; }
    .butterfly-2 { top: -20px; right: 50px; transform: rotate(15deg); }
    
    .deco-leaf {
      position: absolute;
      width: 250px;
      bottom: -100px;
      left: 150px;
      opacity: 0.15;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    .hero-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .img-row {
      display: flex;
      gap: 20px;
    }
    .img-placeholder {
      width: 160px;
      height: 160px;
      background-color: white;
      border-radius: 25px;
      border: 3px solid var(--pink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.03);
    }
    .hero-desc {
      max-width: 350px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #666;
      text-align: right;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .hero { flex-direction: column; text-align: center; }
      .hero-desc { text-align: center; margin-top: 20px; }
      .butterfly-2 { display: none; }
    }
  </style>
</head>
<body>

  <div id="petals"></div>

  <div class="top-banner">
    See how your Debi values you!
  </div>

  <nav>
    <div class="nav-pill">
      <a href="#home">Home</a>
      <a href="#music">Music</a>
      <a href="#quest">Quest</a>
      <a href="#profile">Profile</a>
    </div>
  </nav>

  <main class="hero" id="home">
    <img src="https://cdn-icons-png.flaticon.com/512/3570/3570159.png" class="deco-leaf" alt="leaf decoration">

    <div class="hero-left">
      <p class="hero-question">Who’s debi’s plot twist?</p>
      <h1 class="hero-name">It’s you!<br><span>YANI</span></h1>
      <a href="#quest" class="explore-btn">Explore</a>
      
      <img src="https://cdn-icons-png.flaticon.com/512/590/590772.png" class="deco-butterfly butterfly-1" alt="butterfly">
    </div>

    <div class="hero-right">
      <div class="img-row" style="position: relative;">
        <img src="https://cdn-icons-png.flaticon.com/512/590/590772.png" class="deco-butterfly butterfly-2" alt="butterfly">
        
        <div class="img-placeholder">🌸</div>
        <div class="img-placeholder">📸</div>
      </div>
      <p class="hero-desc">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vestibulum euismod condimentum ligula, eu dignissim lorem mattis ultricies. Aenean a metus turpis.
      </p>
    </div>
  </main>

  <script>
    const petalContainer = document.getElementById('petals');
    const petalEmojis = ['🌸', '🌷', '💗', '✨', '🌺'];

    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.innerText = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
      
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.fontSize = Math.random() * (1.5 - 0.8) + 0.8 + 'rem';
      
      const duration = Math.random() * (10 - 5) + 5;
      petal.style.animationDuration = duration + 's';
      
      petalContainer.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, duration * 1000);
    }

    setInterval(createPetal, 400);
  </script>

</body>
</html>
